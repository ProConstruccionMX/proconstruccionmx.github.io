<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ProConstrucción MX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A2540 0%, #1a4d8c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }
        .login-logo span { color: var(--accent-orange); }
        .login-subtitle {
            text-align: center;
            color: var(--text-gray);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary-dark);
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent-orange);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-login:hover {
            background: var(--accent-orange-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 166, 35, 0.3);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .login-links {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .login-links a {
            color: var(--primary-blue);
            text-decoration: none;
            transition: color 0.3s;
        }
        .login-links a:hover {
            color: var(--accent-orange);
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
            text-align: center;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #dcfce7;
            color: #16a34a;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
            text-align: center;
        }
        .success-message.show {
            display: block;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .volver-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .volver-link:hover {
            color: var(--accent-orange);
        }
        @media (max-width: 480px) {
            .login-container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">ProConstrucción <span>MX</span></div>
        <p class="login-subtitle">Accede a tu cuenta de cliente</p>

        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText">Credenciales incorrectas</span>
        </div>
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i> <span id="successText">¡Bienvenido!</span>
        </div>

        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@correo.com" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>
        </form>

        <div class="login-links">
            <a href="recuperar.html"><i class="fas fa-key"></i> ¿Olvidaste tu contraseña?</a>
            <a href="index.html"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>

        <a href="index.html" class="volver-link">
            <i class="fas fa-home"></i> Ir a la página principal
        </a>
    </div>

    <!-- Cargar EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // ⭐ Inicializar EmailJS con tu Public Key ⭐
        (function() {
            emailjs.init('_gOxtGSQmrhTdoRuX');
        })();

        // Verificar si ya está logueado
        if (sessionStorage.getItem('userLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
