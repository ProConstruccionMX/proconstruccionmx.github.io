<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - ProConstrucción MX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A2540 0%, #1a4d8c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .recuperar-container {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .recuperar-logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }
        .recuperar-logo span { color: var(--accent-orange); }
        .recuperar-subtitle {
            text-align: center;
            color: var(--text-gray);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary-dark);
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
        }
        .btn-recuperar {
            width: 100%;
            padding: 0.9rem;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-recuperar:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(26, 77, 140, 0.3);
        }
        .btn-recuperar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message-box {
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
            text-align: center;
        }
        .message-box.error {
            background: #fee2e2;
            color: #dc2626;
            display: block;
        }
        .message-box.success {
            background: #dcfce7;
            color: #16a34a;
            display: block;
        }
        .whatsapp-btn-container {
            text-align: center;
            margin-top: 1rem;
            padding: 0.8rem;
            background: #f0fdf4;
            border-radius: 12px;
            border: 1px solid #bbf7d0;
            display: none;
        }
        .whatsapp-btn-container a {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            margin-top: 0.3rem;
        }
        .whatsapp-btn-container a:hover {
            background: #128C7E;
            transform: translateY(-2px);
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .volver-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .volver-link:hover {
            color: var(--accent-orange);
        }
        @media (max-width: 480px) {
            .recuperar-container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="recuperar-container">
        <div class="recuperar-logo">ProConstrucción <span>MX</span></div>
        <p class="recuperar-subtitle">Ingresa tu correo para recuperar tu contraseña</p>

        <div id="messageBox" class="message-box"></div>
        <div id="whatsappBtnContainer" class="whatsapp-btn-container"></div>

        <form id="recuperarForm" onsubmit="return handleRecuperar(event)">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@correo.com" required>
            </div>
            <button type="submit" class="btn-recuperar" id="recuperarBtn">
                <i class="fas fa-paper-plane"></i> Enviar contraseña
            </button>
        </form>

        <a href="login.html" class="volver-link">
            <i class="fas fa-arrow-left"></i> Volver a inicio de sesión
        </a>
    </div>

    <!-- Cargar EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // ⭐ Inicializar EmailJS con tu Public Key ⭐
        (function() {
            emailjs.init('_gOxtGSQmrhTdoRuX');
        })();
    </script>
</body>
</html>
